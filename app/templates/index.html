{% extends "base.html" %}

{% block content %}
<section class="content-grid">
    <article class="panel">
        <h2>File Encryption</h2>
        <form id="encryptForm">
            <label class="field-label" for="fileInput">Select file to encrypt:</label>
            <input class="file-field" type="file" id="fileInput" required>
            <div class="actions">
                <button type="submit" class="btn-primary" id="encryptBtn">Encrypt</button>
            </div>
        </form>
        <div class="status" id="encryptResult"></div>
    </article>

    <article class="panel">
        <h2>File Decryption</h2>
        <form id="decryptForm">
            <label class="field-label" for="encryptedFileInput">Select file to decrypt:</label>
            <input class="file-field" type="file" id="encryptedFileInput" required>

            <div class="actions">
                <button type="submit" class="btn-primary" id="decryptBtn">Decrypt</button>
            </div>
        </form>
        <div class="status" id="decryptResult"></div>
    </article>
</section>

<div class="footer-action">
    <button type="button" class="btn-danger" id="clearBtn">Clear Folders</button>
</div>

<div class="status" id="clearResult"></div>

<script>
    const encryptForm = document.getElementById('encryptForm');
    const fileInput = document.getElementById('fileInput');
    const encryptBtn = document.getElementById('encryptBtn');
    const encryptResult = document.getElementById('encryptResult');

    const decryptForm = document.getElementById('decryptForm');
    const encryptedFileInput = document.getElementById('encryptedFileInput');
    const decryptBtn = document.getElementById('decryptBtn');
    const decryptResult = document.getElementById('decryptResult');
    const clearBtn = document.getElementById('clearBtn');
    const clearResult = document.getElementById('clearResult');

    encryptForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!fileInput.files.length) {
            encryptResult.innerHTML = '<p>Please choose a file.</p>';
            return;
        }

        const formData = new FormData();
        formData.append('file', fileInput.files[0]);

        encryptBtn.disabled = true;
        encryptResult.innerHTML = '<p>Encrypting...</p>';

        try {
            const response = await fetch('/upload', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (data.success) {
                encryptResult.innerHTML = `
                    <p>${data.message}</p>
                    <p>Encrypted file: <strong>${data.filename}</strong></p>
                    <a href="${data.download_url}">Download Encrypted File</a>
                `;
                fileInput.value = '';
            } else {
                encryptResult.innerHTML = `<p>Error: ${data.error}</p>`;
            }
        } catch (error) {
            encryptResult.innerHTML = `<p>Error: ${error}</p>`;
        }

        encryptBtn.disabled = false;
    });

    decryptForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!encryptedFileInput.files.length) {
            decryptResult.innerHTML = '<p>Please choose an encrypted file.</p>';
            return;
        }

        const formData = new FormData();
        formData.append('file', encryptedFileInput.files[0]);

        decryptBtn.disabled = true;
        decryptResult.innerHTML = '<p>Decrypting...</p>';

        try {
            const response = await fetch('/decrypt', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (data.success) {
                decryptResult.innerHTML = `
                    <p>${data.message}</p>
                    <p>Decrypted file: <strong>${data.filename}</strong></p>
                    <a href="${data.download_url}">Download Decrypted File</a>
                `;
                encryptedFileInput.value = '';
            } else {
                decryptResult.innerHTML = `<p>Error: ${data.error}</p>`;
            }
        } catch (error) {
            decryptResult.innerHTML = `<p>Error: ${error}</p>`;
        }

        decryptBtn.disabled = false;
    });

    clearBtn.addEventListener('click', async () => {
        clearBtn.disabled = true;
        clearResult.innerHTML = '<p>Clearing uploaded files...</p>';

        try {
            const response = await fetch('/clear_uploads', {
                method: 'POST'
            });

            const data = await response.json();

            if (data.success) {
                clearResult.innerHTML = `<p>${data.message}</p>`;
                encryptResult.innerHTML = '';
                decryptResult.innerHTML = '';
                fileInput.value = '';
                encryptedFileInput.value = '';
            } else {
                clearResult.innerHTML = `<p>Error: ${data.error}</p>`;
            }
        } catch (error) {
            clearResult.innerHTML = `<p>Error: ${error}</p>`;
        }

        clearBtn.disabled = false;
    });
</script>
{% endblock %}
